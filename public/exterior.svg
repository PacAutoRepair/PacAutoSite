<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#E8E0D0"/>
  <!-- Sky -->
  <rect width="800" height="250" fill="#87CEEB"/>
  <!-- Building -->
  <rect x="100" y="150" width="600" height="250" fill="#FAF7F2"/>
  <!-- Roof -->
  <polygon points="80,150 720,150 700,100 100,100" fill="#1A3A5C"/>
  <!-- Sign -->
  <rect x="150" y="160" width="500" height="60" fill="#1A3A5C" rx="4"/>
  <text x="400" y="198" text-anchor="middle" font-size="28" fill="white" font-family="serif" font-weight="bold">PACIFIC AUTO REPAIR</text>
  <!-- Garage doors -->
  <rect x="130" y="260" width="180" height="140" fill="#4A5568" rx="4"/>
  <rect x="330" y="260" width="180" height="140" fill="#4A5568" rx="4"/>
  <rect x="530" y="260" width="180" height="140" fill="#4A5568" rx="4"/>
  <!-- Door lines -->
  <line x1="130" y1="290" x2="310" y2="290" stroke="#666" stroke-width="2"/>
  <line x1="130" y1="320" x2="310" y2="320" stroke="#666" stroke-width="2"/>
  <line x1="130" y1="350" x2="310" y2="350" stroke="#666" stroke-width="2"/>
  <line x1="330" y1="290" x2="510" y2="290" stroke="#666" stroke-width="2"/>
  <line x1="330" y1="320" x2="510" y2="320" stroke="#666" stroke-width="2"/>
  <line x1="330" y1="350" x2="510" y2="350" stroke="#666" stroke-width="2"/>
  <line x1="530" y1="290" x2="710" y2="290" stroke="#666" stroke-width="2"/>
  <line x1="530" y1="320" x2="710" y2="320" stroke="#666" stroke-width="2"/>
  <line x1="530" y1="350" x2="710" y2="350" stroke="#666" stroke-width="2"/>
  <text x="400" y="435" text-anchor="middle" font-size="16" fill="#4A5568" font-family="sans-serif">678 W 6th St, San Pedro, CA 90731</text>
</svg>